{% extends 'base.html' %}
{% block content %}
<div class="flex justify-between mb-4">
    <h1 class="text-2xl font-bold">Servicios</h1>
    <a href="/admin/services/new" class="bg-blue-700 text-white px-4 py-2 rounded">Nuevo</a>
</div>
<table class="w-full bg-white shadow rounded">
    <tr class="border-b">
        <th class="p-2 text-left">Nombre</th>
        <th class="p-2 text-left">Tarifa</th>
        <th class="p-2">Acciones</th>
    </tr>
    {% for item in items %}
    <tr class="border-b">
        <td class="p-2">{{ item.nombre }}</td>
        <td class="p-2">${{ item.tarifa }}</td>
        <td class="p-2">
            <a href="/admin/services/{{ item.id }}/edit" class="text-blue-700">Editar</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
